<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <style>
    body { font-family: system-ui, sans-serif; width: 300px; margin: 0; padding: 14px; background: #0f1115; color: #e8eaed; }
    h1 { font-size: 14px; margin: 0 0 12px; letter-spacing: 1px; }
    label { display: block; font-size: 11px; color: #9aa3b2; margin: 10px 0 4px; }
    input { width: 100%; box-sizing: border-box; padding: 7px 9px; border-radius: 7px; border: 1px solid #2a303c; background: #1f242e; color: #e8eaed; font-size: 13px; }
    button { width: 100%; margin-top: 12px; padding: 9px; border-radius: 8px; border: none; background: #4f8cff; color: #fff; font-size: 14px; cursor: pointer; }
    button.secondary { background: #1f242e; border: 1px solid #2a303c; color: #e8eaed; }
    #status { font-size: 12px; margin-top: 10px; min-height: 16px; }
    details { margin-top: 12px; }
    summary { font-size: 12px; color: #9aa3b2; cursor: pointer; }
  </style>
</head>
<body>
  <h1>DECIDO</h1>
  <button id="capture">Bu ürünü ekle</button>
  <div id="status"></div>

  <details id="settings">
    <summary>Ayarlar</summary>
    <label>DECIDO adresi</label>
    <input id="endpoint" placeholder="https://decido.example.com" />
    <label>API anahtarı (DECIDO_API_KEY)</label>
    <input id="apikey" type="password" placeholder="•••" />
    <button id="save" class="secondary">Ayarları kaydet</button>
  </details>

  <script src="popup.js"></script>
</body>
</html>
